services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: kairos
    ports:
      - "5432:5432"
    volumes:
      - kairos_pg:/var/lib/postgresql/data

  redis:
    image: redis:7
    command: ["redis-server", "--maxmemory-policy", "noeviction"]
    ports:
      - "6379:6379"

volumes:
  kairos_pg:
